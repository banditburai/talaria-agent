name: Create Release Tag

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

jobs:
  create-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.RELEASE_TOKEN }}
    
    - name: Configure Git
      run: |
        git config user.name "${{ github.actor }}"
        git config user.email "${{ github.actor }}@users.noreply.github.com"
    
    - name: Get current version and calculate next version
      id: version
      run: |
        CURRENT_VERSION=$(grep "^version = " talaria/talaria-core/pyproject.toml | cut -d'"' -f2)
        echo "Current version: $CURRENT_VERSION"
        
        if [ -z "$CURRENT_VERSION" ]; then
          echo "Error: Could not extract version"
          exit 1
        fi
        
        IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
        
        RELEASE_TYPE="${{ github.event.inputs.release_type }}"
        case $RELEASE_TYPE in
          major)
            NEW_MAJOR=$((MAJOR + 1))
            NEW_MINOR=0
            NEW_PATCH=0
            ;;
          minor)
            NEW_MAJOR=$MAJOR
            NEW_MINOR=$((MINOR + 1))
            NEW_PATCH=0
            ;;
          patch)
            NEW_MAJOR=$MAJOR
            NEW_MINOR=$MINOR
            NEW_PATCH=$((PATCH + 1))
            ;;
        esac
        
        NEW_VERSION="$NEW_MAJOR.$NEW_MINOR.$NEW_PATCH"
        
        echo "Current: $CURRENT_VERSION -> New: $NEW_VERSION"
        echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT
        echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT
    
    - name: Check if version already exists
      run: |
        VERSION="v${{ steps.version.outputs.new }}"
        if git rev-parse "$VERSION" >/dev/null 2>&1; then
          echo "Tag $VERSION already exists!"
          exit 1
        fi
        echo "Tag $VERSION does not exist yet"
    
    - name: Update version in pyproject.toml
      run: |
        VERSION="${{ steps.version.outputs.new }}"
        sed -i "s/^version = \".*\"/version = \"$VERSION\"/" talaria/talaria-core/pyproject.toml
        grep "^version = " talaria/talaria-core/pyproject.toml
    
    - name: Commit version bump
      run: |
        git add talaria/talaria-core/pyproject.toml
        git commit -m "chore: bump version to ${{ steps.version.outputs.new }}"
        git push origin main
    
    - name: Generate release notes
      run: |
        PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
        VERSION="v${{ steps.version.outputs.new }}"
        
        if [ -z "$PREV_TAG" ]; then
          NOTES="Initial release of Talaria"
        else
          NOTES="Changes since $PREV_TAG"
        fi
        
        echo "RELEASE_NOTES<<EOF" >> $GITHUB_ENV
        echo "$NOTES" >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV
    
    - name: Create and push tag
      run: |
        VERSION="v${{ steps.version.outputs.new }}"
        TYPE="${{ github.event.inputs.release_type }}"
        
        git tag -a "$VERSION" -m "Release $VERSION ($TYPE release)"
        git push origin "$VERSION"
        
        echo "Created tag $VERSION - release workflow will trigger"
