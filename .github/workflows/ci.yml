name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          
      - name: Install dependencies
        run: uv sync --all-extras
        
      - name: Lint
        run: uv run ruff check talaria/
        
      - name: Type check
        run: uv run mypy talaria/talaria-core/src/
        
      - name: Test
        run: uv run pytest --co -q
