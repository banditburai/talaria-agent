name: Code Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Install uv
      uses: astral-sh/setup-uv@v4
      
    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}
      
    - name: Install Python dependencies
      run: uv sync --all-extras

    - name: Lint with ruff
      run: |
        uv run ruff check talaria/
        uv run ruff format --check talaria/
        
    - name: Type check with ty
      run: uv run ty check talaria/talaria-core/src/
      
    - name: Run tests
      run: |
        PYTHONPATH=talaria/talaria-core/src uv run pytest talaria/talaria-core/tests/ -v --tb=short

  quality-check:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: All quality checks passed
        run: echo "✅ All quality checks passed!"
