name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-and-validate:
    name: Build and Validate Package
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install uv
      uses: astral-sh/setup-uv@v4
      
    - name: Install Python build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install twine validate-pyproject
    
    - name: Validate pyproject.toml
      run: validate-pyproject talaria/talaria-core/pyproject.toml
    
    - name: Build Python package
      run: uv build -p talaria/talaria-core
    
    - name: Validate package contents
      run: |
        echo "📦 Validating package structure..."
        python -m zipfile -l dist/*.whl | head -20
        echo "✅ Package validation complete"
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: python-package-distributions
        path: dist/
        retention-days: 7

  publish-to-testpypi:
    name: Publish to TestPyPI
    needs: [build-and-validate]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment:
      name: test-pypi
      url: https://test.pypi.org/p/talaria
    permissions:
      id-token: write
    
    steps:
    - name: Download package distributions
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/
    
    - name: Publish to TestPyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/
        print-hash: true

  publish-to-pypi:
    name: Publish to PyPI
    needs: [build-and-validate]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    environment:
      name: pypi
      url: https://pypi.org/p/talaria
    permissions:
      id-token: write
      contents: write
    
    steps:
    - name: Download package distributions
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/
    
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        print-hash: true

  create-github-release:
    name: Create GitHub Release
    needs: [publish-to-pypi]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Download package distributions
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/
    
    - name: Determine release type
      id: release-type
      run: |
        REF="${{ github.ref_name }}"
        if [[ "$REF" =~ -alpha|-beta|-rc ]]; then
          echo "prerelease=true" >> $GITHUB_OUTPUT
          echo "📦 Pre-release detected: $REF"
        else
          echo "prerelease=false" >> $GITHUB_OUTPUT
          echo "🚀 Stable release detected: $REF"
        fi
    
    - name: Create GitHub Release
      run: |
        REF="${{ github.ref_name }}"
        PRERELEASE="${{ steps.release-type.outputs.prerelease }}"
        if [ "$PRERELEASE" = "true" ]; then
          FLAG="--prerelease"
        else
          FLAG="--latest"
        fi
        gh release create "$REF" \
          --title "Talaria $REF" \
          --generate-notes \
          $FLAG \
          dist/*
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
